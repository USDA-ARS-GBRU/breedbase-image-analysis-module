name: Release — build and push Docker image

# Fires only when a semver-shaped tag (vX.Y.Z) is pushed.
# Branch pushes never trigger this, so ':latest' is never produced.
on:
  push:
    tags:
      - 'v*.*.*'

env:
  IMAGE: hkmanchi/sorghum-breedbase-image-pipeline

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker tag == git tag (e.g. v2.0.0), guaranteeing git <-> Docker parity.
      - name: Derive image tag from git ref
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}

      # Record the digest so it can be pasted into the GitHub Release notes
      # for immutable, digest-level pinning by consumers.
      - name: Print image digest
        run: |
          echo "Pushed ${IMAGE}:${{ steps.meta.outputs.tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
